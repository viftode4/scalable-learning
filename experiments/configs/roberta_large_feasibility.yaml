# RoBERTa-Large feasibility gate for the OpenReview supplement harness.
#
# This is NOT a paper result. It is the smallest supplement-consumable GPU probe
# that answers whether RoBERTa-Large can load, tokenize, train, evaluate, and
# emit our RoLoRA/LoRA/FFA-LoRA markers before we spend cluster time on Table 1.
#
# Dataset rule:
# - MNLI is the project-primary target.
# - This file still points to qnli.json because the current extracted supplement
#   has that path locally verified. Replace data.root/type with MNLI once MNLI
#   prep is confirmed, and ledger the change.
#
# Run on a GPU-capable machine:
#   make roberta-large-feasibility MODE=rolora
#
# Repeat with MODE=lora and MODE=ffa_lora only after the RoLoRA feasibility pass.

use_gpu: True
device: 0
early_stop:
  patience: 0

federate:
  mode: standalone
  total_round_num: 1
  save_to: "roberta-large-feasibility.ckpt"
  client_num: 3
  share_local_model: True

data:
  root: code/harness/rolora-supplement/RoLoRA-code/sst2/
  type: 'qnli.json@llm'
  splits: [0.89, 0.1, 0.01]
  splitter: 'iid'

llm:
  tok_len: 96
  chat:
    max_len: 384
    max_history_len: 4
  adapter:
    use: True
    args: [ { 'adapter_package': 'peft', 'adapter_method': 'lora', 'r': 4, 'lora_alpha': 16, 'lora_dropout': 0.1 } ]

dataloader:
  batch_size: 2

model:
  type: 'roberta-large@huggingface_llm'

train:
  local_update_steps: 1
  batch_or_epoch: batch
  optimizer:
    lr: 0.005
    weight_decay: 0.0002
  is_enable_half: True

trainer:
  type: llmtrainer
criterion:
  type: CrossEntropyLoss

eval:
  freq: 1
  metrics: ['loss', 'acc']
  best_res_update_round_wise_key: val_loss
