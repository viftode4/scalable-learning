# Local Table-1-shaped pilot for the OpenReview supplement harness.
#
# This is intentionally smaller than paper Table 1:
# - roberta-base instead of roberta-large
# - QNLI only (the supplement is already wired for qnli.json)
# - 3 clients, 3 rounds, 3 local batches
#
# Goal: prove the real supplement harness can run a Table-1-shaped local job in
# each mode before we spend cluster time. Do not compare these numbers to paper
# Table 1; use them as setup and pipeline evidence.

use_gpu: False
device: -1
early_stop:
  patience: 0

federate:
  mode: standalone
  total_round_num: 3
  save_to: "table1-local-pilot.ckpt"
  client_num: 3
  share_local_model: True

data:
  root: code/harness/rolora-supplement/RoLoRA-code/sst2/
  type: 'qnli.json@llm'
  splits: [0.89, 0.1, 0.01]
  splitter: 'iid'

llm:
  tok_len: 96
  chat:
    max_len: 384
    max_history_len: 4
  adapter:
    use: True
    args: [ { 'adapter_package': 'peft', 'adapter_method': 'lora', 'r': 4, 'lora_alpha': 16, 'lora_dropout': 0.1 } ]

dataloader:
  batch_size: 4

model:
  type: 'roberta-base@huggingface_llm'

train:
  local_update_steps: 3
  batch_or_epoch: batch
  optimizer:
    lr: 0.005
    weight_decay: 0.0002
  is_enable_half: False

trainer:
  type: llmtrainer
criterion:
  type: CrossEntropyLoss

eval:
  freq: 3
  metrics: ['loss', 'acc']
  best_res_update_round_wise_key: val_loss
