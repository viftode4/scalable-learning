# Reproduction cell C3 — QNLI, RoBERTa-Large, 50 clients, LoRA rank 4.
# See `repro_qnli_c3_r4.yaml` for the cell-pattern header.
# Maps to Table 1 row: Rank 4, Clients 50. This is the load-bearing client-scaling row.

use_gpu: True
device: 0
seed: 0
early_stop:
  patience: 0

federate:
  mode: standalone
  total_round_num: 30
  save_to: "repro-qnli-c50-r4.ckpt"
  client_num: 50
  share_local_model: True

data:
  root: code/harness/rolora-supplement/RoLoRA-code/sst2/
  type: 'qnli.json@llm'
  splits: [0.89, 0.1, 0.01]
  splitter: 'iid'

llm:
  tok_len: 128
  chat:
    max_len: 1000
    max_history_len: 10
  adapter:
    use: True
    args: [ { 'adapter_package': 'peft', 'adapter_method': 'lora', 'r': 4, 'lora_alpha': 32, 'lora_dropout': 0.1 } ]

dataloader:
  batch_size: 32

model:
  type: 'roberta-large@huggingface_llm'

train:
  local_update_steps: 20
  batch_or_epoch: batch
  optimizer:
    lr: 0.005
    weight_decay: 0.0002
  is_enable_half: False

trainer:
  type: llmtrainer
criterion:
  type: CrossEntropyLoss

eval:
  # See repro_qnli_c20_r4.yaml for the freq=1 rationale.
  freq: 1
  metrics: ['loss', 'acc']
  best_res_update_round_wise_key: val_loss
  # See repro_qnli_c20_r4.yaml for why count_flops is False.
  count_flops: False
