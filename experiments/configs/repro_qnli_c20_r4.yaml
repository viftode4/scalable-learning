# Reproduction cell C2 — QNLI, RoBERTa-Large, 20 clients, LoRA rank 4.
# See `repro_qnli_c3_r4.yaml` for the cell-pattern header.
# Maps to Table 1 row: Rank 4, Clients 20.

use_gpu: True
device: 0
seed: 0
early_stop:
  patience: 0

federate:
  mode: standalone
  # Paper Table 6 (p41) says 500 comm rounds at 3 clients, scaled down with
  # client count to keep the sample budget constant: 500*3 = 1500 client-rounds.
  # For 20 clients, this yields 1500/20 = 75 rounds. The previously shipped 30
  # rounds matched the 50-client setting (1500/50 = 30), which is what the
  # authors' `test_glue.yaml` ships — but that's the wrong cell for our C2
  # (20-client) experiment. See ADR 0006 §"What the paper actually says".
  total_round_num: 75
  save_to: "repro-qnli-c20-r4.ckpt"
  client_num: 20
  share_local_model: True

data:
  root: code/harness/rolora-supplement/RoLoRA-code/sst2/
  type: 'qnli.json@llm'
  splits: [0.89, 0.1, 0.01]
  splitter: 'iid'

llm:
  tok_len: 128
  chat:
    max_len: 1000
    max_history_len: 10
  adapter:
    use: True
    args: [ { 'adapter_package': 'peft', 'adapter_method': 'lora', 'r': 4, 'lora_alpha': 32, 'lora_dropout': 0.1 } ]

dataloader:
  batch_size: 32

model:
  type: 'roberta-large@huggingface_llm'

train:
  local_update_steps: 20
  batch_or_epoch: batch
  optimizer:
    # AdamW lr 5e-4 reaches test_acc 0.86-0.88 in 40 rounds across all 3 modes
    # on the local RoBERTa-base mech-check (`results/overnight_*_adamw.log`);
    # the authors' shipped SGD lr 0.005 sits at chance (0.49-0.52) on the same
    # arms. See ADR 0006 for the full empirical matrix + the paper's
    # underspecified-optimizer story (paper Table 6 lists no optimizer; Section
    # 5 says LR was tuned over {5e-4,…,1e-1} with best-of-sweep reported).
    type: AdamW
    lr: 0.0005
    weight_decay: 0.0002
  is_enable_half: False

trainer:
  type: llmtrainer
criterion:
  type: CrossEntropyLoss

eval:
  # freq: 5 = evaluate every 5 FL rounds. The previous freq=1 setting was
  # eating ~12 min/round in extra eval wall-time at 20 clients × bs=32, which
  # capped completed rounds at ~10 of 30 inside the 4 h gpu-a100-small slice.
  # At freq=5 we get 15 eval points across the (now 75) total rounds, the
  # convergence curve is still readable, and we fit ~30+ rounds of actual
  # training in the budget. AdamW lr 5e-4 reaches near-peak by round 15-20 on
  # the local RoBERTa-base mech-check, so a truncated 30-round run already
  # produces a paper-comparable trajectory.
  freq: 5
  metrics: ['loss', 'acc']
  best_res_update_round_wise_key: val_loss
  # Disable FederatedScope's one-shot FlopCountAnalysis at job start — it
  # pollutes the CUDA caching allocator and causes CUBLAS_STATUS_ALLOC_FAILED
  # on the 10 GB gpu-a100-small MIG slice. We don't report FLOPS anywhere.
  count_flops: False
